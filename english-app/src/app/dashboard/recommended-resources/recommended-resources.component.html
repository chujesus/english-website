<!-- Page Header -->
<div class="bg-light py-4 mb-4">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="display-6 text-primary">
                    <i class="fas fa-star text-warning me-2"></i>Recommended Resources
                </h1>
                <p class="lead text-muted mb-0">Explore curated books, videos, and tutorials to enhance your English
                    learning</p>
            </div>
        </div>
    </div>
</div>

<!-- Recommended Links -->
<div class="container mb-5">
    <div class="row g-4">
        <div *ngFor="let link of recommendedLinks" class="col-lg-4 col-md-6 col-sm-12">
            <div class="recommended-card h-100 shadow-sm border-0">
                <div class="card-header bg-gradient" [ngClass]="'bg-' + link.color">
                    <div class="d-flex align-items-center justify-content-between">
                        <span class="badge bg-white text-dark">{{ link.type }}</span>
                        <i [class]="link.icon + ' text-white'"></i>
                    </div>
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-dark mb-2">{{ link.title }}</h5>
                    <p class="card-text text-muted flex-grow-1">{{ link.description }}</p>
                    <a [href]="link.url" target="_blank" rel="noopener noreferrer"
                        class="btn btn-outline-primary btn-sm mt-3 align-self-start">
                        <i class="fas fa-external-link-alt me-2"></i>Visit Resource
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
